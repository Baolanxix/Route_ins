<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Field Route Navigator v15</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>
  <div class="tools">
    <label class="btn">Chọn KMZ/KML<input id="fileInput" type="file" accept=".kmz,.kml" hidden></label>
    <button id="skipBtn" class="btn">Bỏ qua đoạn</button>
    <button id="skip300Btn" class="btn">Bỏ qua 300m</button>
    <button id="resetBtn" class="btn">Đặt lại</button>
    <button id="exportBtn" class="btn">Xuất GPX</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://unpkg.com/@tmcw/togeojson@5.8.1/dist/togeojson.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
